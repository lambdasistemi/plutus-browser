package:
  name: plutus-browser
  dependencies:
    - aff
    - aff-promise
    - arrays
    - browser-git
    - codemirror
    - console
    - effect
    - either
    - maybe
    - mui
    - prelude
    - react-basic
    - react-basic-dom
    - react-basic-hooks
    - strings
    - wasi-runner
    - web-dom
    - web-html
  bundle:
    module: Main
    outfile: dist/index.ps.js
    platform: browser
    type: app

