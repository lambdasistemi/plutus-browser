      git: https://github.com/lambdasistemi/purescript-spa-kit.git
      ref: 1fe8673a5226d3992af1eb991267f4986d674ed5
      subdir: mui
    codemirror:
      git: https://github.com/lambdasistemi/purescript-spa-kit.git
      ref: 1fe8673a5226d3992af1eb991267f4986d674ed5
      subdir: codemirror
    browser-git:
      git: https://github.com/lambdasistemi/purescript-spa-kit.git
